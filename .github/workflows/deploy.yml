name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

# Allow the action to write and publish content to the gh-pages branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm ci
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder where build outputs are placed (Vite default)
          branch: gh-pages # The branch the action should deploy to
